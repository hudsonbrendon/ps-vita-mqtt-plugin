name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential
      - name: Host tests
        run: make host-tests

  integration:
    runs-on: ubuntu-latest
    needs: host-tests
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y build-essential netcat-openbsd
      - name: Mosquitto integration test
        run: bash tests/integration/run_integration.sh

  suprx:
    runs-on: ubuntu-latest
    needs: host-tests
    container: vitasdk/vitasdk:latest
    steps:
      - uses: actions/checkout@v4
      - name: Build main + companion .suprx
        run: |
          apk add --no-cache make bash
          make all
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ps-vita-mqtt-build
          path: |
            build/ps-vita-mqtt.suprx
            build/ps-vita-mqtt-tag.suprx
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/ps-vita-mqtt.suprx
            build/ps-vita-mqtt-tag.suprx
            config.example.json
            recovery/config.txt
          generate_release_notes: true
